# On push [1]
# [1] https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows

on: workflow_dispatch

jobs:
  rescuezilla-iso-build:
    # The build bot OS environment does not really matter, as the docker image provides the primary host environment for the build.
    # However, a more recent OS provides a more recent Docker release, which means additional Docker functionality.
    # Launches Docker container to act as 'host system'. See BUILD.ISO.IMAGE.md for more information.
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0

      # Extract human-readable version string from the most recent CHANGELOG entry
      - run: echo "RESCUEZILLA_RELEASE_NAME=\"$(git grep -h -E -o '[a-zA-Z].*)' CHANGELOG | head -1)\"" >> $GITHUB_ENV

      # Get deb package version using same command from its build scripts
      # - run: echo "DEB_VERSION=$(git describe --tags  --match='[0-9].[0-9]*' --abbrev=0)" >> $GITHUB_ENV
      - run: echo "DEB_VERSION=\"$(git grep -h -E -o '[0-9]\.[0-9]\.[0-9])' CHANGELOG | head -1)\"" >> $GITHUB_ENV

      # Define tag name
      - run: echo "RELEASE_TAG=v${DEB_VERSION}" >> $GITHUB_ENV

      - name: Build Docker image
        run: make docker-build

      - name: Launch Docker container
        run: make docker-run

      - name: Trust the git folder
        run: make docker-add-safe-directory

      - run: make docker-status
      - name: Make DEB package
        run: make docker-deb

      - name: Run unit tests within the Docker container
        run: make docker-test

      # - run: make docker-status
      # - name: Make Ubuntu 22.10 (Kinetic) ISO
        # run: make docker-kinetic
      # - run: sudo mv build/rescuezilla.amd64.kinetic.iso build/rescuezilla-${{env.DEB_VERSION}}-64bit.kinetic.iso

      - run: make docker-status
      - name: Make Ubuntu 22.04 LTS (Jammy) ISO [LTS  = Long Term Support]
        run: make docker-jammy
      - run: sudo mv build/rescuezilla.amd64.jammy.iso build/rescuezilla-${{env.DEB_VERSION}}-64bit.jammy.iso

      - name: Create checksums for ISO images
        run: cd build && sudo ../src/scripts/create_iso_checksums.sh rescuezilla_${{env.DEB_VERSION}}-1_all.deb rescuezilla-${{env.DEB_VERSION}}-*.iso

      # Create tag automatically if it does not exist
      - name: Create tag if not exists
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git rev-parse "${{env.RELEASE_TAG}}" >/dev/null 2>&1; then
            echo "Tag already exists, skipping"
          else
            git tag "${{env.RELEASE_TAG}}"
            git push origin "${{env.RELEASE_TAG}}"
          fi

      - name: Upload release assets (on tag push)
        uses: softprops/action-gh-release@v1
        # if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        with:
          tag_name: ${{env.RELEASE_TAG}}
          name: ${{env.DEB_VERSION}} (${{env.RELEASE_DATE}})
          files: |
            build/*SUM
            build/rescuezilla_${{env.DEB_VERSION}}-1_all.deb
            build/rescuezilla-${{env.DEB_VERSION}}-*.iso
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      # Upload GitHub Action workflow *artifacts*. Note "artifacts" are a different concept to GitHub release rssets.
      # The former is available on each GitHub Actions workflow run. The latter is associated with only a pushed tag.

      - uses: actions/upload-artifact@v4
        with:
          name: SHA256SUM
          path: build/SHA256SUM

      - uses: actions/upload-artifact@v4
        with:
          name: MD5SUM
          path: build/MD5SUM

      - uses: actions/upload-artifact@v4
        with:
          name: SHA1SUM
          path: build/SHA1SUM

      - uses: actions/upload-artifact@v4
        with:
          name: rescuezilla_${{env.DEB_VERSION}}-1_all.deb
          path: build/rescuezilla_${{env.DEB_VERSION}}-1_all.deb

      # - uses: actions/upload-artifact@v4
        # with:
          # name: rescuezilla-${{env.DEB_VERSION}}-64bit.kinetic.iso
          # path: build/rescuezilla-${{env.DEB_VERSION}}-64bit.kinetic.iso

      - uses: actions/upload-artifact@v4
        with:
          name: rescuezilla-${{env.DEB_VERSION}}-64bit.jammy.iso
          path: build/rescuezilla-${{env.DEB_VERSION}}-64bit.jammy.iso
